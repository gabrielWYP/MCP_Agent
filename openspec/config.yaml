schema: spec-driven

context: |
  Tech stack: Python 3.14 (system) / 3.12 (venv), LangGraph + LangChain orchestrator, PyTorch 2.1+ (ConvNeXtV2 Teacher), FastAPI serving
  Architecture: Graph-based agent (LangGraph StateGraph), pipeline pattern, multimodal DL (RGB+NIR, cross-modal fusion, YOLO detection head, knowledge distillation), OCI cloud storage
  Testing: pytest available. Single test file (src/models/master/test_arch.py) — script-style assertions, not pytest functions. No CI/CD yet (Phase 2).
  Style: pip+requirements.txt. No pyproject.toml. No linter/formatter/type checker configured yet (Phase 3 — ruff, mypy, ruff format).

testing:
  strict_tdd: false
  reason: "Phase 1 test bootstrap archived. Current test_arch.py has a level mismatch bug (DualFPN→4 levels, YOLODetectionHead←3). Needs fix before tests pass."
  test_runner:
    command: "python -m pytest src/models/master/test_arch.py -v"
    framework: pytest (installed in .venv, but no pytest-style test functions)
  layers:
    unit:
      available: true
      tool: "pytest (script-style assertions)"
      scope: "src/models/master/test_arch.py (module-by-module sanity checks)"
      count: 0
      note: "test_arch.py runs as __main__ script, not pytest-collected tests. Contains assert statements that will crash on shape mismatch."
      coverage: "N/A — broken; formerly 96%"
    integration:
      available: false
      tool: "—"
      planned: "Phase 2"
    e2e:
      available: false
      tool: "—"
  coverage:
    available: true
    command: "python -m pytest --cov=src/models/master/ src/models/master/test_arch.py"
    threshold: "N/A (currently broken)"
  quality:
    linter:
      available: false
      command: "—"
      planned: "Phase 3 (ruff)"
    type_checker:
      available: false
      command: "—"
      planned: "Phase 3 (mypy)"
    formatter:
      available: false
      command: "—"
      planned: "Phase 3 (ruff format)"

rules:
  proposal:
    - Include rollback plan for risky changes
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
    - All new AI/ML pipelines require an evaluation protocol
  tasks:
    - Group by phase, use hierarchical numbering
    - Keep tasks completable in one session
  apply:
    - Follow existing code patterns (src/package modular structure)
    - New modules go under src/<domain>/
    tdd: false
    test_command: "python -m pytest src/models/master/test_arch.py -v"
  verify:
    test_command: "python -m pytest src/models/master/test_arch.py -v"
    build_command: "python -c \"import sys; exec(open('src/models/master/test_arch.py').read())\""
    coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas
