# Data Augmentation Pipeline Configuration

# OCI / S3 Object Storage
oci_endpoint: "https://id39lkzyqahe.compat.objectstorage.us-ashburn-1.oraclecloud.com"
oci_bucket: "bucketDemosWEB"
oci_prefix: "news/"
oci_region: "us-ashburn-1"
oci_access_key: "336d67850dadcf86fb2bff040f61e76eec4ff62f"
oci_secret_key: "UAQCq3DfzMrhOVYx0KyyA/5j0zaIIHRFXQte6r1mzWE="

# Local paths
cache_dir: "data/cache"
output_dir: "data/augmented"
homography_path: "notebooks/matriz_homografia_aruco.npy"  # Path to .npy homography matrix, or null for resize fallback

# Image dimensions
target_size: [640, 640]  # [height, width]

# Augmentation parameters
augmentation_factor: 3    # Total samples per original (1 = identity only)
spatial_intensity: 0.4    # Controls rotation/scale/shift limits
photometric_intensity: 0.3  # Controls brightness/contrast/saturation

# NIR normalization statistics
nir_stats:
  mean: 0.0569
  std: 0.0546

# Download settings
max_workers: 8           # Parallel download threads
retry_attempts: 3        # OCI retry count with exponential backoff
retry_base_delay: 1.0    # Base delay in seconds (2^n * base)

# Pair discovery mode: "stem" (default) or "timestamp_id" (for mango_rgb_{id} / mango_nir_{id})
pair_matching: "timestamp_id"

# Only download pairs with timestamp ID >= this value
# May 24, 2026 00:00 UTC = 1779580800
min_timestamp: 1779580800

# Default class name for unlabeled data (matching by timestamp_id)
default_class_name: "mango"
