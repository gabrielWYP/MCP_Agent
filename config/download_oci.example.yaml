# OCI download configuration for RGB/NIR cache population.
#
# Keep secrets out of Git. Set S3_ENDPOINT_URL, BUCKET_NAME, OCI_REGION,
# S3_ACCESS_KEY, and S3_SECRET_KEY in the environment or .env.

oci_endpoint: ""
oci_bucket: ""
oci_prefix: "news/"
oci_region: "us-ashburn-1"
oci_access_key: ""
oci_secret_key: ""

cache_dir: "data/cache"

max_workers: 8
retry_attempts: 3
retry_base_delay: 1.0

# Pair discovery mode: "stem" or "timestamp_id" for mango_rgb_{id}/mango_nir_{id}.
pair_matching: "timestamp_id"

# June 5, 2026 00:00 UTC = 1780617600
min_timestamp: 1780617600
default_class_name: "mango"
